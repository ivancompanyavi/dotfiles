packages:
  darwin:
    taps:
      - 'jesseduffield/lazygit'
      - 'FelixKratz/formulae'
    brews:
    - 'git'
    - 'cmake'
    - 'coreutils'
    - 'fd'
    - 'fzf'
    - 'gcalcli'
    - 'starship'
    - 'lua'
    - 'lua-language-server'
    - 'basedpyright'
    - 'neovim'
    - 'ruff'
    - 'ripgrep'
    - 'stylua'
    - 'typescript-language-server'
    - 'wget'
    - 'jesseduffield/lazygit/lazygit'
    - 'sketchybar'
    - 'borders'
    casks:
    # NB: swappable app casks (browser, terminal, editor) live in apps.yaml
    # (.apps.<x>.cask) so each app's whole definition stays in one place; the
    # install template pulls them in. Only non-app casks remain here.
    - 'font-fira-code'
    - 'font-hack-nerd-font'
    - 'nikitabobko/tap/aerospace'
